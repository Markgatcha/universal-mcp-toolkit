name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lockfile drift: fail fast if pnpm-lock.yaml is out of sync with
  # package.json (the frozen install errors out clearly before the full
  # build/typecheck/test matrix wastes time).
  verify-lockfile:
    name: Verify lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node 22
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
      - name: Verify pnpm-lock.yaml is in sync
        run: pnpm install --frozen-lockfile --prefer-offline

  ci:
    name: Build, Typecheck & Test (${{ matrix.os }}, Node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    needs: [verify-lockfile]
    strategy:
      fail-fast: false
      matrix:
        # Active Node LTS lines + stable OS coverage
        node-version: [22, 24]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Enable corepack
        run: corepack enable

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript version
        run: pnpm exec tsc --version

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # Rolling Node smoke: exercises the LATEST stable Node on every run so
  # that future breaking changes are caught continuously instead of only
  # via the pinned LTS matrix. This job is allowed to break on its own
  # (not in the release-gate chain) so it can't silently rot, but it still
  # flags drift.
  ci-rolling:
    name: CI (rolling Node)
    runs-on: ubuntu-latest
    needs: [verify-lockfile]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Enable corepack
        run: corepack enable
      - name: Setup latest Node.js
        uses: actions/setup-node@v7
        with:
          node-version: current
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

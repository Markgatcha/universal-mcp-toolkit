name: Release

# Publishes all changed UMT packages to npm automatically whenever a GitHub
# Release is published. Uses changesets to version + publish the workspace.
# Requires a repository secret NPM_TOKEN (npm automation token with publish rights).
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish universal-mcp-toolkit to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enable corepack
        run: corepack enable
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - name: Verify pnpm-lock.yaml is in sync
        run: pnpm install --frozen-lockfile --prefer-offline
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Publish (changesets)
        # Publishes any package whose version is ahead of the registry.
        run: pnpm exec changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
